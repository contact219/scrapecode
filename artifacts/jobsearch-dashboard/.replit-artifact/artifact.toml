kind = "web"
previewPath = "/"
title = "JobSearch Pro Dashboard"
version = "1.0.0"
id = "artifacts/jobsearch-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23500
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/jobsearch-dashboard run dev"

[services.env]
PORT = "23500"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/jobsearch-dashboard", "run", "build"]
publicDir = "artifacts/jobsearch-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
