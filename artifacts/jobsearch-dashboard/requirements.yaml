packages:
  "framer-motion": "For page transitions and smooth UI animations"
  "recharts": "For dashboard charts and statistics"
  "date-fns": "For formatting dates in history and dashboard"
  "react-hook-form": "Form management"
  "@hookform/resolvers": "Zod resolver for forms"
